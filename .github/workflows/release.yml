name: Release

# Packs a Velopack installer when a version tag is pushed (e.g. v0.1.0) and attaches it to a DRAFT
# GitHub release — publishing the release stays a human decision. Unsigned by design for v1.
# workflow_dispatch exists so the pipeline can be exercised BEFORE the first real tag: a manual run
# packs the given version and uploads it as a plain artifact (no release is created).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pack (e.g. 0.0.1-test)'
        required: true
        default: '0.0.1-test'

permissions:
  contents: write

jobs:
  pack:
    name: Velopack installer (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/BgRecorder.App/Web/package-lock.json

      # Keep in lockstep with the Velopack PackageReference in BgRecorder.App.csproj — the CLI and
      # the in-app runtime must match, and an unpinned tool would float past the pinned library.
      - name: Install vpk
        run: dotnet tool install --global vpk --version 1.2.0

      - name: Pack
        run: |
          $version = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { "${{ github.ref_name }}".TrimStart("v") }
          powershell -File scripts/pack.ps1 -Version $version

      - name: Attach to a draft release
        if: github.event_name == 'push'
        run: >
          gh release create "${{ github.ref_name }}" --draft --generate-notes
          (Get-ChildItem artifacts/releases | ForEach-Object { $_.FullName })
        env:
          GH_TOKEN: ${{ github.token }}

      # Manual runs get a plain workflow artifact instead of a release.
      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ inputs.version }}
          path: artifacts/releases/
